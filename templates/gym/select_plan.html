{% extends 'base.html' %}

{% block title %}Select Plan | FitCore Gym{% endblock %}

{% block content %}
<section class="py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-6">
                <div class="card border-0 shadow-sm">
                    <div class="card-body p-4 p-md-5">
                        <p class="text-muted mb-2">Confirm Membership</p>
                        <h1 class="fw-bold mb-3">{{ plan.name }}</h1>
                        <p class="display-6 fw-bold text-primary mb-2">₹{{ plan.price }}</p>
                        <p class="text-muted mb-4">This membership stays active for {{ plan.duration }} days.</p>
                        <form method="post">
                            {% csrf_token %}
                            <button type="submit" class="btn btn-primary w-100 mb-3">Confirm Plan Selection</button>
                        </form>
                        <a href="{% url 'plans' %}" class="btn btn-outline-secondary w-100">Back to Plans</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
